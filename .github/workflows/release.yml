name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller imageio-ffmpeg
      
      - name: Build with PyInstaller
        run: |
          python -m PyInstaller `
            --name=yadisk-downloader `
            --windowed `
            --onedir `
            --hidden-import=customtkinter `
            --hidden-import=requests `
            --hidden-import=playwright `
            --hidden-import=yadisk_downloader `
            --collect-all=customtkinter `
            --collect-all=imageio_ffmpeg `
            yadisk_downloader/__main__.py
      
      - name: Create portable zip
        run: |
          Compress-Archive -Path dist/yadisk-downloader -DestinationPath dist/yadisk-downloader-windows.zip
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/yadisk-downloader-windows.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller imageio-ffmpeg
      
      - name: Build with PyInstaller
        run: |
          python -m PyInstaller \
            --name=yadisk-downloader \
            --windowed \
            --onedir \
            --hidden-import=customtkinter \
            --hidden-import=requests \
            --hidden-import=playwright \
            --collect-all=customtkinter \
            --collect-all=imageio_ffmpeg \
            yadisk_downloader/__main__.py
      
      - name: Create zip
        run: |
          cd dist && zip -r yadisk-downloader-macos.zip yadisk-downloader.app
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/yadisk-downloader-macos.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller imageio-ffmpeg
      
      - name: Build with PyInstaller
        run: |
          python -m PyInstaller \
            --name=yadisk-downloader \
            --onedir \
            --hidden-import=customtkinter \
            --hidden-import=requests \
            --hidden-import=playwright \
            --collect-all=customtkinter \
            --collect-all=imageio_ffmpeg \
            yadisk_downloader/__main__.py
      
      - name: Create zip
        run: |
          cd dist && zip -r yadisk-downloader-linux.zip yadisk-downloader
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/yadisk-downloader-linux.zip

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
      
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            windows/yadisk-downloader-windows.zip
            macos/yadisk-downloader-macos.zip
            linux/yadisk-downloader-linux.zip
